spring.application.name=lendit-backend

# Server
server.port=${PORT:8080}

# AIVEN_MySQL
# spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/lendit_db}
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:false}

# JWT
jwt.secret=${JWT_SECRET:LendItSecretKey2026LocalDevelopmentOnly}
jwt.expiration=${JWT_EXPIRATION:86400000}

# File Upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# ML inference (used by RiskScoreService)
ml.inference.enabled=${ML_INFERENCE_ENABLED:false}
ml.inference.endpoint=${ML_INFERENCE_ENDPOINT:}
ml.inference.pythonExecutable=${ML_INFERENCE_PYTHON_EXECUTABLE:python3}
ml.inference.scriptPath=ml/infer.py
